# ===================================================================
# Plasmodium falciparum Pipeline - Parameter Configuration
#
# 사용법: nextflow run main.nf -params-file configs/params.yaml
# 주의: 키 이름이 nextflow.config params {} 블록과 동일해야 합니다.
# ===================================================================

# ==================== DATA PATHS ====================
bam_root: "./results/alignment/minimap2"
bam_glob: "*.bam"
fastq_root: "./data"
fastq_glob: "barcode*/*.fastq.gz"
outdir: "./results"

# ==================== REFERENCE FILES ====================
# null → resources/ 폴더 기본값 사용 (main.nf에서 자동 처리)
bed: null
ref: null

# ==================== ANALYSIS TOGGLES ====================
do_fastqc: false          # FastQ 품질 관리
do_alignment: true        # minimap2 정렬 (FASTQ 입력 필요)
do_depth: true            # 깊이 분석
do_ivar: true             # iVar consensus 생성
do_gene_bins: true        # 유전자별 깊이 분석
do_variants: true         # 변이 호출
do_multipanel: false      # 다중 패널 플롯 (do_gene_bins 필요)
do_gene_1x8: false        # 1×8 유전자 플롯 (do_gene_bins 필요)
do_afdp: true             # AF/DP 피규어 (do_variants 필요)
do_translate: false       # CDS 번역 + per-gene MSA + 변이표 (do_variants 필요)

# ==================== IVAR PARAMETERS ====================
ivar_threshold: 0.6       # consensus 결정 threshold
ivar_min_cons_cov: 10     # consensus 최소 커버리지
ivar_min_var_cov: 1       # 변이 최소 커버리지
genes: "CRT DHFR DHPS K13 MDR1 MSP2 PMI PMIII"

# ==================== MINIMAP2 PARAMETERS ====================
minimap2_preset: "map-ont"   # map-ont | map-pb | sr | asm5
minimap2_threads: 4

# ==================== BCFTOOLS PARAMETERS ====================
variant_method: "bcftools"
bcftools_mode: "mv"          # m = multiallelic, v = output vcf
snp_only: true
bcftools_threads: 4
max_depth: 10000

# ==================== AF/DP FIGURE PARAMETERS ====================
afdp_min_depth: 15
afdp_af_threshold: 0.50
afdp_shade_xmin: 0.48
afdp_shade_xmax: 0.52

# ==================== COMPUTE RESOURCES ====================
max_cpus: 32
max_memory: "128.GB"
max_time: "240.h"
